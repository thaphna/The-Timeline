<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cambodia вҖ” The Timeline</title>
<style>
  :root{
    --bg:#FFFFFF;
    --ink:#111111;
    --gray:#8A8A8A;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    min-height:100vh;
    background:var(--bg);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,
      'Noto Sans Khmer','Khmer Sangam MN','Khmer UI','Khmer OS',sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
  }
  /* Khmer script is taller; give it room to breathe */
  html[lang="km"] .summary{line-height:1.9}
  html[lang="km"] .panel p{line-height:1.9}
  html[lang="km"] .label .title{font-size:12px;line-height:1.6}

  /* ---------- language switch ---------- */
  .langs{
    position:absolute;
    top:18px;right:22px;
    display:flex;
    gap:14px;
  }
  .langs button{
    background:none;
    border:none;
    font:inherit;
    font-size:13px;
    color:#C0C0C0;
    cursor:pointer;
    padding:2px 0;
  }
  .langs button:hover{color:var(--gray)}
  .langs button.active{color:var(--ink);font-weight:600}
  .langs button:focus-visible{outline:2px solid var(--ink);outline-offset:3px}

  /* ---------- top ---------- */
  h1{
    font-size:26px;
    font-weight:500;
    margin-top:clamp(40px,9vh,90px);
    letter-spacing:.01em;
  }
  .summary{
    margin-top:10px;
    max-width:52ch;
    padding:0 20px;
    text-align:center;
    font-size:13.5px;
    line-height:1.55;
    color:var(--gray);
  }

  /* ---------- the line ---------- */
  .stage{
    flex:1;
    width:100%;
    display:flex;
    align-items:center;
    overflow-x:auto;
    overflow-y:hidden;
    scrollbar-width:none;
  }
  .stage::-webkit-scrollbar{display:none}
  .track{
    position:relative;
    height:380px;
    display:flex;
    align-items:center;
    margin:0 auto;
  }
  .line{
    position:absolute;
    left:0;right:0;
    top:50%;
    height:2px;
    background:var(--ink);
    transform-origin:left center;
    animation:draw .9s ease both;
  }
  .line::after{          /* arrowhead: the line points toward the present */
    content:"";
    position:absolute;
    right:0;
    top:50%;
    width:9px;height:9px;
    border-top:2px solid var(--ink);
    border-right:2px solid var(--ink);
    transform:translateY(-50%) rotate(45deg);
  }
  @keyframes draw{from{transform:scaleX(0)}to{transform:scaleX(1)}}
  @media (prefers-reduced-motion:reduce){
    .line{animation:none}
    *{transition:none !important}
  }

  /* ---------- nodes ---------- */
  .node{position:absolute;top:50%}
  .node .dot,
  .node .stem,
  .node .label{
    opacity:0;
    pointer-events:none;
    transition:opacity .45s ease, background .15s;
  }
  /* hover peek: only the event directly under the cursor surfaces */
  .node.peek .dot{
    opacity:.9;
    pointer-events:auto;   /* clicking the dot opens its info; the line stays as it is */
  }
  .node.peek .label{
    opacity:1;
    pointer-events:none;
  }
  .node.peek .stem{
    opacity:.3;
    pointer-events:none;
  }
  .dot{
    position:absolute;
    top:-5px;left:-5px;
    width:10px;height:10px;
    border-radius:50%;
    background:var(--ink);
    border:2px solid var(--ink);
    cursor:pointer;
    transition:background .15s;
  }
  .dot:focus-visible{outline:2px solid var(--ink);outline-offset:3px}
  .node.open .dot{background:var(--bg)}

  .stem{
    position:absolute;
    left:-0.75px;
    width:1.5px;
    background:var(--ink);
    opacity:.45;
  }
  .node.above .stem{top:-34px;height:26px}
  .node.below .stem{top:8px;height:26px}

  .label{
    position:absolute;
    left:0;
    transform:translateX(-50%);
    width:150px;
    text-align:center;
    cursor:pointer;
  }
  .node.above .label{bottom:40px}
  .node.below .label{top:40px}
  .label .year{
    display:block;
    font-size:10.5px;
    color:var(--gray);
    margin-bottom:1px;
  }
  .label .title{
    display:block;
    font-size:12.5px;
    line-height:1.3;
    color:var(--ink);
  }
  .label:hover .title{text-decoration:underline}

  .panel{
    position:absolute;
    left:0;
    background:var(--bg);
    border:1.5px solid var(--ink);
    border-radius:14px;
    padding:13px 16px;
    width:280px;
    opacity:0;
    pointer-events:none;
    transform:translateX(-50%);
    transition:opacity .18s,transform .18s;
    z-index:5;
    cursor:pointer;
  }
  .panel.top{                 /* sits just above the line */
    bottom:16px;
    transform:translateX(-50%) translateY(4px);
  }
  .panel.bottom{              /* hangs just below the line */
    top:16px;
    transform:translateX(-50%) translateY(-4px);
  }
  .node.open .panel{
    opacity:1;
    pointer-events:auto;
    transform:translateX(-50%) translateY(0);
  }
  /* an open event stays visible even when the rest of the line is empty */
  .node.open .dot{
    opacity:1;
    pointer-events:auto;
  }
  .panel .y{font-size:12px;color:var(--gray);margin-bottom:3px}
  .panel h3{font-size:15px;font-weight:600;line-height:1.35}
  .panel p{font-size:12.5px;line-height:1.55;color:#444}

  .hint{
    padding:18px;
    font-size:12px;
    color:#C0C0C0;
    text-align:center;
  }

  @media (max-width:600px){
    .track{height:340px}
    .panel{width:228px}
    .langs{top:14px;right:16px}
  }
</style>
</head>

       "бһҡбһ”бһ”бһ”бҹүбһ»бһӣ бһ–бһҸ бһ”бһҺбҹ’бһҸбҹҒбһүбһ”бҹ’бһҡбһҮбһ¶бһҮбһ“бһ…бҹҒбһүбһ–бһёбһ‘бһёбһҖбҹ’бһҡбһ»бһ„ бһ бһҫбһҷбһҖбҹ’бһ“бһ»бһ„бһҡбһҷбҹҲбһ–бҹҒбһӣбһ”бһҪбһ“бһҶбҹ’бһ“бһ¶бҹҶ бһ”бһ¶бһ“бһ”бһҺбҹ’бһҸбһ¶бһӣбһұбҹ’бһҷбһ”бҹ’бһҡбһҮбһ¶бһҮбһ“бһ”бҹ’бһҡбһҳбһ¶бһҺбһҳбһҪбһҷбһ—бһ¶бһӮбһ”бһҪбһ“бһ”бһ¶бһҸбҹӢбһ”бһ„бҹӢбһҮбһёбһңбһ·бһҸбҹ”"],

       "бһҖбһ„бһ‘бҹҗбһ–бһңбҹҖбһҸбһҺбһ¶бһҳ бһ“бһ·бһ„бһҖбһҳбҹ’бһӣбһ¶бҹҶбһ„бһҒбҹ’бһҳбҹӮбһҡбһҠбҹӮбһӣбһ„бһҫбһ”бһ”бҹҮбһ”бҹ„бһҡ бһ…бһјбһӣбһҖбһ¶бһ“бҹӢбһҖбһ¶бһ”бҹӢбһ—бҹ’бһ“бҹҶбһ–бҹҒбһү бһ”бһүбҹ’бһ…бһ”бҹӢбһҡбһ”бһ”бһ“бҹҒбҹҮ бһ бһҫбһҷбһҠбҹҶбһҺбһҫбһҡбһҹбҹ’бһҸбһ¶бһҡбһ”бҹ’бһҡбһ‘бҹҒбһҹбһҠбҹҸбһҷбһјбһҡбһўбһ„бҹ’бһңбҹӮбһ„бһҖбҹҸбһ…бһ¶бһ”бҹӢбһ•бҹ’бһҸбһҫбһҳбҹ”"],
      ["бҹЎбҹ©бҹ©бҹЈ","бһҖбһ¶бһҡбһҹбҹ’бһҸбһ¶бһҡбһҡбһ”бһ”бһҡбһ¶бһҮбһ¶бһ“бһ·бһҷбһҳ",
       "бһҖбһ¶бһҡбһ”бҹ„бҹҮбһҶбҹ’бһ“бҹ„бһҸбһҡбҹҖбһ”бһ…бҹҶбһҠбҹ„бһҷбһўбһ„бҹ’бһӮбһҖбһ¶бһҡбһҹбһ бһ”бҹ’бһҡбһҮбһ¶бһҮбһ¶бһҸбһ· бһ”бһ„бҹ’бһҖбһҫбһҸбһҡбһҠбҹ’бһӢбһ’бһҳбҹ’бһҳбһ“бһ»бһүбҹ’бһүбһҗбҹ’бһҳбһё бһ–бҹ’бһҡбҹҮбһ”бһ¶бһ‘бһҹбһёбһ бһ“бһ» бһңбһ·бһӣбһҸбҹ’бһҡбһЎбһ”бҹӢбһҮбһ¶бһ–бҹ’бһҡбҹҮбһҳбһ бһ¶бһҖбҹ’бһҹбһҸбҹ’бһҡбһ“бҹғбһҡбһ¶бһҮбһ¶бһ’бһ·бһ”бһҸбҹҒбһҷбҹ’бһҷбһўбһ¶бһҹбҹ’бһҡбҹҗбһҷбһҡбһҠбҹ’бһӢбһ’бһҳбҹ’бһҳбһ“бһ»бһүбҹ’бһүбҹ”"],
      ["бҹЎбҹ©бҹ©бҹ©","бһ…бһјбһӣбһҮбһ¶бһҹбһҳбһ¶бһҮбһ·бһҖбһўбһ¶бһҹбҹҠбһ¶бһ“",
       "бһҖбһҳбҹ’бһ–бһ»бһҮбһ¶бһ…бһјбһӣбһҡбһҪбһҳбһҖбҹ’бһ“бһ»бһ„бһҹбһҳбһ¶бһӮбһҳбһ”бҹ’бһҡбһҮбһ¶бһҮбһ¶бһҸбһ·бһўбһ¶бһҹбҹҠбһёбһўбһ¶бһӮбҹ’бһ“бҹҒбһҷбҹҚ бһҮбһ¶бһҹбһүбҹ’бһүбһ¶бһ“бҹғбһҖбһ¶бһҡбһңбһ·бһӣбһҸбҹ’бһҡбһЎбһ”бҹӢбһҳбһҖбһҖбһ¶бһ“бҹӢбһҹбһ бһӮбһҳбһ“бҹҚбһҸбҹҶбһ”бһ“бҹӢбһңбһ·бһүбҹ”"],
      ["бһ”бһ…бҹ’бһ…бһ»бһ”бҹ’бһ”бһ“бҹ’бһ“","бһҖбһҳбҹ’бһ–бһ»бһҮбһ¶бһҖбҹ’бһ“бһ»бһ„бһҶбҹ’бһ“бһ¶бҹҶбҹўбҹ бҹўбҹҰ",

    ]
  }
};

const track = document.getElementById('track');
const stage = document.getElementById('stage');
const hint  = document.getElementById('hint');

track.style.minWidth = 'min(640px, 86vw)';

function esc(s){
  return String(s ?? '').replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function build(lang){
  const t = I18N[lang];
  document.documentElement.lang = lang;
  document.title = t.title + ' \u2014 The Timeline';
  document.getElementById('title').textContent = t.title;
  document.getElementById('summary').textContent = t.summary;
  hint.textContent = t.hint;

  track.querySelectorAll('.node').forEach(n => n.remove());

  t.events.forEach((ev, i) => {
    const [year, title, detail] = ev;
    const node = document.createElement('div');
    node.className = 'node ' + (i % 2 === 0 ? 'above' : 'below');
    node.style.left = (5 + i * (90 / (t.events.length - 1))) + '%';
    node.innerHTML =
      '<span class="stem"></span>' +
      '<button class="dot" aria-expanded="false" aria-label="' + esc(year + ' \u2014 ' + title) + '"></button>' +
      '<span class="label"><span class="year">' + esc(year) + '</span>' +
      '<span class="title">' + esc(title) + '</span></span>' +
      '<div class="panel top"><div class="y">' + esc(year) + '</div>' +
      '<h3>' + esc(title) + '</h3></div>' +
      '<div class="panel bottom"><p>' + esc(detail) + '</p></div>';
    const open = () => {
      const wasOpen = node.classList.contains('open');
      track.querySelectorAll('.node.open').forEach(n => {
        n.classList.remove('open');
        n.querySelector('.dot').setAttribute('aria-expanded','false');
      });
      if(!wasOpen){
        node.classList.add('open');
        node.querySelector('.dot').setAttribute('aria-expanded','true');
      }
    };
    node.querySelector('.dot').addEventListener('click', open);
    node.querySelector('.label').addEventListener('click', open);
    node.querySelectorAll('.panel').forEach(p => p.addEventListener('click', open));
    track.appendChild(node);
  });
}

/* language switch */
document.querySelectorAll('.langs button').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.langs button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    build(b.dataset.l);
  });
});

build('en');

/* hover peek: surface the event whose dot is directly under the cursor.
   Tracked on the stage (not the line) so the peeked dot doesn't steal
   the hover and flicker. */
const nodes = () => track.querySelectorAll('.node');
function clearPeek(){
  track.querySelectorAll('.node.peek').forEach(n => n.classList.remove('peek'));
}
stage.addEventListener('mousemove', e => {
  const rect = track.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - (rect.top + rect.height / 2);   // distance from the line
  const HIT = 9;   // px вҖ” the cursor must be on the dot itself, not just near it
  let hit = null;
  if(Math.abs(y) <= 16){
    nodes().forEach(n => {
      if(Math.abs(n.offsetLeft - x) <= HIT) hit = n;
    });
  }
  clearPeek();
  if(hit) hit.classList.add('peek');
});
stage.addEventListener('mouseleave', clearPeek);

/* tap fallback: on touch screens there's no hover, so a tap on a dot's
   position along the line opens that event directly */
stage.addEventListener('click', e => {
  if(e.target.closest('.dot,.panel,.label')) return;
  const rect = track.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - (rect.top + rect.height / 2);
  if(Math.abs(y) > 18) return;
  let hit = null;
  nodes().forEach(n => {
    if(Math.abs(n.offsetLeft - x) <= 12) hit = n;
  });
  if(hit) hit.querySelector('.dot').click();
});
</script>
