<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cambodia — The Timeline</title>
<style>
  :root{
    --bg:#FFFFFF;
    --ink:#111111;
    --gray:#8A8A8A;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    min-height:100vh;
    background:var(--bg);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,
      'Noto Sans Khmer','Khmer Sangam MN','Khmer UI','Khmer OS',sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
  }
  /* Khmer script is taller; give it room to breathe */
  html[lang="km"] .summary{line-height:1.9}
  html[lang="km"] .panel p{line-height:1.9}
  html[lang="km"] .label .title{font-size:12px;line-height:1.6}

  /* ---------- language switch ---------- */
  .langs{
    position:absolute;
    top:18px;right:22px;
    display:flex;
    gap:14px;
  }
  .langs button{
    background:none;
    border:none;
    font:inherit;
    font-size:13px;
    color:#C0C0C0;
    cursor:pointer;
    padding:2px 0;
  }
  .langs button:hover{color:var(--gray)}
  .langs button.active{color:var(--ink);font-weight:600}
  .langs button:focus-visible{outline:2px solid var(--ink);outline-offset:3px}

  /* ---------- top ---------- */
  h1{
    font-size:26px;
    font-weight:500;
    margin-top:clamp(40px,9vh,90px);
    letter-spacing:.01em;
  }
  .summary{
    margin-top:10px;
    max-width:52ch;
    padding:0 20px;
    text-align:center;
    font-size:13.5px;
    line-height:1.55;
    color:var(--gray);
  }

  /* ---------- the line ---------- */
  .stage{
    flex:1;
    width:100%;
    display:flex;
    align-items:center;
    overflow-x:auto;
    overflow-y:hidden;
    scrollbar-width:none;
  }
  .stage::-webkit-scrollbar{display:none}
  .track{
    position:relative;
    height:380px;
    min-width:min(640px, 86vw);
    display:flex;
    align-items:center;
    margin:0 auto;
  }
  .line{
    position:absolute;
    left:0;right:0;
    top:50%;
    height:2px;
    background:var(--ink);
    transform-origin:left center;
    animation:draw .9s ease both;
  }
  .line::after{          /* arrowhead: the line points toward the present */
    content:"";
    position:absolute;
    right:0;
    top:50%;
    width:9px;height:9px;
    border-top:2px solid var(--ink);
    border-right:2px solid var(--ink);
    transform:translateY(-50%) rotate(45deg);
  }
  @keyframes draw{from{transform:scaleX(0)}to{transform:scaleX(1)}}
  @media (prefers-reduced-motion:reduce){
    .line{animation:none}
    *{transition:none !important}
  }

  /* ---------- nodes ---------- */
  .node{position:absolute;left:var(--p);top:50%}
  .node .dot,
  .node .stem,
  .node .label{
    opacity:0;
    pointer-events:none;
    transition:opacity .45s ease, background .15s;
  }
  /* hover peek: only the event directly under the cursor surfaces */
  .node.peek .dot{
    opacity:.9;
    pointer-events:auto;   /* clicking the dot opens its info; the line stays as it is */
  }
  .node.peek .label{
    opacity:1;
    pointer-events:none;
  }
  .node.peek .stem{
    opacity:.3;
    pointer-events:none;
  }
  .dot{
    position:absolute;
    top:-5px;left:-5px;
    width:10px;height:10px;
    border-radius:50%;
    background:var(--ink);
    border:2px solid var(--ink);
    cursor:pointer;
    transition:background .15s;
  }
  .dot:focus-visible{outline:2px solid var(--ink);outline-offset:3px}
  .node.open .dot{background:var(--bg)}

  .stem{
    position:absolute;
    left:-0.75px;
    width:1.5px;
    background:var(--ink);
    opacity:.45;
  }
  .node.above .stem{top:-34px;height:26px}
  .node.below .stem{top:8px;height:26px}

  .label{
    position:absolute;
    left:0;
    transform:translateX(-50%);
    width:150px;
    text-align:center;
    cursor:pointer;
  }
  .node.above .label{bottom:40px}
  .node.below .label{top:40px}
  .label .year{
    display:block;
    font-size:10.5px;
    color:var(--gray);
    margin-bottom:1px;
  }
  .label .title{
    display:block;
    font-size:12.5px;
    line-height:1.3;
    color:var(--ink);
  }
  .label:hover .title{text-decoration:underline}

  .panel{
    position:absolute;
    left:0;
    background:var(--bg);
    border:1.5px solid var(--ink);
    border-radius:14px;
    padding:13px 16px;
    width:280px;
    opacity:0;
    pointer-events:none;
    transform:translateX(-50%);
    transition:opacity .18s,transform .18s;
    z-index:5;
    cursor:pointer;
  }
  .panel.top{                 /* sits just above the line */
    bottom:16px;
    transform:translateX(-50%) translateY(4px);
  }
  .panel.bottom{              /* hangs just below the line */
    top:16px;
    transform:translateX(-50%) translateY(-4px);
  }
  .node.open .panel{
    opacity:1;
    pointer-events:auto;
    transform:translateX(-50%) translateY(0);
  }
  /* an open event stays visible even when the rest of the line is empty */
  .node.open .dot{
    opacity:1;
    pointer-events:auto;
  }
  .panel .y{font-size:12px;color:var(--gray);margin-bottom:3px}
  .panel h3{font-size:15px;font-weight:600;line-height:1.35}
  .panel p{font-size:12.5px;line-height:1.55;color:#444}

  .hint{
    padding:18px;
    font-size:12px;
    color:#C0C0C0;
    text-align:center;
  }

  /* ---------- phones: the line stands vertical, origin at top ---------- */
  @media (max-width:600px){
    .langs{top:14px;right:16px}
    .stage{overflow:visible}
    .track{
      min-width:0;
      width:10px;
      height:min(62vh, 560px);
      margin:8px auto 0;
    }
    .line{
      left:50%;right:auto;top:0;bottom:0;
      width:2px;height:auto;
      margin-left:-1px;
      transform-origin:center top;
    }
    @keyframes draw{from{transform:scaleY(0)}to{transform:scaleY(1)}}
    .line::after{          /* arrowhead points down, toward the present */
      right:auto;top:auto;
      bottom:0;left:50%;
      border-top:none;border-right:none;
      border-left:2px solid var(--ink);
      border-bottom:2px solid var(--ink);
      transform:translateX(-50%) rotate(-45deg);
    }

    .node{left:50%;top:var(--p)}

    .node.above .stem,
    .node.below .stem{
      width:26px;height:1.5px;
      top:-0.75px;
    }
    .node.above .stem{left:-34px}
    .node.below .stem{left:8px}

    .label{width:34vw}
    .node.above .label,
    .node.below .label{
      top:0;bottom:auto;
      transform:translateY(-50%);
    }
    .node.above .label{right:42px;left:auto;text-align:right}
    .node.below .label{left:42px;right:auto;text-align:left}

    .panel{
      width:40vw;
      max-width:200px;
      padding:11px 13px;
    }
    .panel.top{
      right:20px;left:auto;
      top:0;bottom:auto;
      transform:translateY(-50%) translateX(4px);
    }
    .panel.bottom{
      left:20px;right:auto;
      top:0;bottom:auto;
      transform:translateY(-50%) translateX(-4px);
    }
    .node.open .panel.top,
    .node.open .panel.bottom{transform:translateY(-50%) translateX(0)}
    .panel h3{font-size:14px}
    .panel p{font-size:12px}
  }
</style>
</head>
<body>

       "កម្ពុជាចូលរួមក្នុងសមាគមប្រជាជាតិអាស៊ីអាគ្នេយ៍ ជាសញ្ញានៃការវិលត្រឡប់មកកាន់សហគមន៍តំបន់វិញ។"],
      ["បច្ចុប្បន្ន","កម្ពុជាក្នុងឆ្នាំ២០២៦",
       "រាជាធិបតេយ្យអាស្រ័យរដ្ឋធម្មនុញ្ញដែលមានប្រជាជនប្រមាណ១៧លាននាក់ ដោយមានអង្គរ និងប្រវត្តិសាស្ត្រនៃភាពធន់ ស្ថិតនៅបេះដូងនៃអត្តសញ្ញាណជាតិ។"]
    ]
  }
};

const track = document.getElementById('track');
const stage = document.getElementById('stage');
const hint  = document.getElementById('hint');

function esc(s){
  return String(s ?? '').replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function build(lang){
  const t = I18N[lang];
  document.documentElement.lang = lang;
  document.title = t.title + ' \u2014 The Timeline';
  document.getElementById('title').textContent = t.title;
  document.getElementById('summary').textContent = t.summary;
  hint.textContent = t.hint;

  track.querySelectorAll('.node').forEach(n => n.remove());

  t.events.forEach((ev, i) => {
    const [year, title, detail] = ev;
    const node = document.createElement('div');
    node.className = 'node ' + (i % 2 === 0 ? 'above' : 'below');
    node.style.setProperty('--p', (5 + i * (90 / (t.events.length - 1))) + '%');
    node.innerHTML =
      '<span class="stem"></span>' +
      '<button class="dot" aria-expanded="false" aria-label="' + esc(year + ' \u2014 ' + title) + '"></button>' +
      '<span class="label"><span class="year">' + esc(year) + '</span>' +
      '<span class="title">' + esc(title) + '</span></span>' +
      '<div class="panel top"><div class="y">' + esc(year) + '</div>' +
      '<h3>' + esc(title) + '</h3></div>' +
      '<div class="panel bottom"><p>' + esc(detail) + '</p></div>';
    const open = () => {
      const wasOpen = node.classList.contains('open');
      track.querySelectorAll('.node.open').forEach(n => {
        n.classList.remove('open');
        n.querySelector('.dot').setAttribute('aria-expanded','false');
      });
      if(!wasOpen){
        node.classList.add('open');
        node.querySelector('.dot').setAttribute('aria-expanded','true');
      }
    };
    node.querySelector('.dot').addEventListener('click', open);
    node.querySelector('.label').addEventListener('click', open);
    node.querySelectorAll('.panel').forEach(p => p.addEventListener('click', open));
    track.appendChild(node);
  });
}

/* language switch */
document.querySelectorAll('.langs button').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.langs button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    build(b.dataset.l);
  });
});

build('en');

/* hover peek: surface the event whose dot is directly under the cursor.
   Tracked on the stage (not the line) so the peeked dot doesn't steal
   the hover and flicker. Works for both the horizontal (desktop) and
   vertical (phone) line. */
const nodes = () => track.querySelectorAll('.node');
const isVertical = () => matchMedia('(max-width:600px)').matches;
function clearPeek(){
  track.querySelectorAll('.node.peek').forEach(n => n.classList.remove('peek'));
}
function findHit(clientX, clientY, slack){
  const rect = track.getBoundingClientRect();
  let along, cross, pos;
  if(isVertical()){
    along = clientY - rect.top;
    cross = clientX - (rect.left + rect.width / 2);
    pos = n => n.offsetTop;
  }else{
    along = clientX - rect.left;
    cross = clientY - (rect.top + rect.height / 2);
    pos = n => n.offsetLeft;
  }
  if(Math.abs(cross) > 18) return null;
  let hit = null;
  nodes().forEach(n => {
    if(Math.abs(pos(n) - along) <= slack) hit = n;
  });
  return hit;
}
stage.addEventListener('mousemove', e => {
  const hit = findHit(e.clientX, e.clientY, 9);  // the cursor must be on the dot itself
  clearPeek();
  if(hit) hit.classList.add('peek');
});
stage.addEventListener('mouseleave', clearPeek);

/* tap fallback: on touch screens there's no hover, so a tap on a dot's
   position along the line opens that event directly */
let suppressClose = false;
stage.addEventListener('click', e => {
  if(e.target.closest('.dot,.panel,.label')) return;
  const hit = findHit(e.clientX, e.clientY, 14);  // slightly wider for fingers
  if(hit){
    suppressClose = true;          // don't let the click-away handler undo this
    hit.querySelector('.dot').click();
  }
});

/* click-away: tapping empty space anywhere returns the line to normal */
function closeAll(){
  track.querySelectorAll('.node.open').forEach(n => {
    n.classList.remove('open');
    n.querySelector('.dot').setAttribute('aria-expanded','false');
  });
}
document.addEventListener('click', e => {
  if(suppressClose){ suppressClose = false; return; }
  if(e.target.closest('.dot,.panel,.label,.langs')) return;
  closeAll();
});
document.addEventListener('keydown', e => {
  if(e.key === 'Escape') closeAll();
});
</script>
